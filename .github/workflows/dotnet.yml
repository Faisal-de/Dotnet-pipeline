name: .NET Core CI/CD
on:
  push:
    branches: [ main ]
 
jobs:  
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./FirstWebApp
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.103

    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore  --configuration Release