name: .NET Local CI/CD
on:
  push:
    branches: [ main ]
jobs:  
  build-and-deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./FirstWebApp
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Restore and Build
      run: dotnet build --configuration Release
    - name: Prepare IIS Folder
      shell: powershell
      run: |
        $path = "C:\inetpub\wwwroot\FirstWebApp"
        if (Test-Path $path) {
          Get-Children -Path $path | Remove-Item -Recurse -Force
        }
        else {  
        New-Item -ItemType Directory -Path $path -Force
        }
    - name: Deploy to IIS
      run: dotnet publish -c Release -o C:\inetpub\wwwroot\FirstWebApp